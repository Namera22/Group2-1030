<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="A page where a user can submit an application to join a smart city infrastructure consultancy">
        <meta name="keywords" content="apply, application, job, recruitment, form, smart city, consultancy">
        <meta name="author" content="James Heneghan">
        <link href="./style.css" rel="stylesheet">
        <title>Smart City infrastructure consultancy</title>
    </head>
    <body>
       <header class="hero">
            <video autoplay loop muted plays-inline class="video">
                <source src="./images/Credit-to-sony-background-video.mp4" type="video/mp4">
            </video>
            <h1 class="overlay-text">JOIN THE TEAM</h1>
            <p class="info">Estimated time: 5 to 8 minutes • Fields marked * are required</p>
        </header>
        <form action="https://swinburne.instructure.com/courses/71841/assignments/formtest.php." method="post">
            <section class="form-section"></section>
                <div class="section-heading">
                    <span class="section-number">1</span>
                    <div>
                        <h2>Job Details</h2>
                        <p>What are the details of the job you are applying for?</p>
                    </div>
                </div>
                    <div>
                        <h2>Job Reference number</h2>
                    </div>
                    <div class="form-elements">
                        <label for="job-reference" class="form-label">Job Reference</label>
                        <input type="text" name="job-reference" maxlength="5" 
                        size="20" required="required" pattern="^[a-zA-Z0-9]+" placeholder="Job Reference Number" style="text-align: center;" required class="form-input">
                    </div>
            <section class="form-section"></section>
                <div class="section-heading">
                    <span class="section-number">2</span>
                    <div>
                        <h2>Personal Details</h2>
                        <p>Tell us who you are!</p>
                    </div>
                    <div class="form-elements">
                        <label for="first-name" class="form-label">First Name</label>
                        <input type="text" name="first-name" maxlength="20" pattern="^[a-zA-Z]+" placeholder="First Name" required size="30" class="form-input">
                    </div>
            
                    <div class="form-elements">
                        <label for="last-name" class="form-label">Last Name</label>
                        <input type="text" name="last-name" maxlength="20" pattern="^[a-zA-Z]+" placeholder="Last Name" required size="30" class="form-input">
                    </div>

                    <div>

                    </div>
            </section>
        </form>
    </body>
</html>
